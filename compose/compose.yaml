services:
  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_SCHEMA=${POSTGRES_SCHEMA}
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - .env
    networks:
      - db
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    environment:
      - GW_HOST=0.0.0.0
      - GW_PORT=3000
      - GW_CONFIG_PATH=/app/config.yaml
    networks:
      - internal
    depends_on:
      - backend

networks:
  db:
    driver: bridge
  internal:
    driver: bridge

volumes:
  db: